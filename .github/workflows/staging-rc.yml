name: Staging release candidate

# On every push to staging, publish a release-candidate snapshot to npm under the
# `rc` dist-tag, so downstream repos can test unreleased changes with
# `npm i @lerna-labs/ekklesia-helpers@rc`. The RC version is a Changesets
# snapshot (X.Y.Z-rc-<timestamp>) computed from the pending changesets; nothing
# is committed to staging and the changeset files stay intact for the real
# release on main. The `rc` dist-tag never moves `latest`.
#
# Also keeps a single open staging -> main promotion PR alive.
on:
  push:
    branches: [staging]

concurrency:
  group: staging-rc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    # Skip the RC publish entirely when staging already matches the released main
    # (nothing unreleased to preview -- e.g. right after a release backport).
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.g.outputs.build }}
    steps:
      - id: g
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          main_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.commit.tree.sha')
          head_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/staging" --jq '.commit.tree.sha')
          if [ "$main_tree" = "$head_tree" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "staging matches the released main; nothing unreleased to preview."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

  rc-publish:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Compute snapshot RC version
        id: rc
        run: |
          pending=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | head -1)
          if [ -n "$pending" ]; then
            npx changeset version --snapshot rc
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
            echo "has_rc=true" >> "$GITHUB_OUTPUT"
          else
            # No pending changesets: the snapshot would equal the released version,
            # which already exists on npm. Nothing to publish.
            echo "has_rc=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets; skipping the rc publish."
          fi

      - name: Build
        if: steps.rc.outputs.has_rc == 'true'
        run: npm run build

      - name: Publish rc snapshot to npm
        if: steps.rc.outputs.has_rc == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --no-git-checks: the working tree is intentionally dirty from the
        # snapshot version bump, which is discarded next and never committed.
        run: npm publish --tag rc --no-git-checks

      - name: Discard snapshot bump
        run: git checkout -- .

  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_MANAGER_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_MANAGER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open or refresh the staging -> main promotion PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Compare content trees, not commit counts (merge-commit asymmetry
          # would otherwise open empty PRs). Identical trees mean nothing to promote.
          base_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.commit.tree.sha')
          head_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/staging" --jq '.commit.tree.sha')
          if [ "$base_tree" = "$head_tree" ]; then
            echo "staging and main have identical trees; nothing to promote."
            exit 0
          fi
          # Body lists the pending changesets so the accumulator shows what is queued.
          node .github/scripts/promotion-body.mjs main > pr-body.md
          num=$(gh pr list --repo "$GITHUB_REPOSITORY" --base main --head staging --state open --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            jq -Rs '{body: .}' pr-body.md | gh api -X PATCH "repos/$GITHUB_REPOSITORY/pulls/$num" --input - >/dev/null
            echo "Refreshed promotion PR #$num body."
          else
            gh pr create --repo "$GITHUB_REPOSITORY" --base main --head staging \
              --title "Promote staging to main" --body-file pr-body.md --label promotion
          fi
