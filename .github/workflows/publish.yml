name: Publish

# Single npm publisher, driven by the branch:
#   staging -> release-candidate snapshot under the `rc` dist-tag
#   main    -> production release (`latest`) via Changesets
#
# Both publish through npm trusted publishing (OIDC), so this one workflow file
# is the single registered trusted publisher on the npm package and no
# NPM_TOKEN is stored. Every publish carries a provenance attestation.
on:
  push:
    branches: [main, staging]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Production release from main. changesets/action opens a Version Packages PR
  # while changesets are pending; once that PR is merged (none pending), it
  # builds and runs `changeset publish`, publishing `latest` to npm, pushing the
  # tag, and creating the GitHub Release. Attributed to the Release Manager App.
  release:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_MANAGER_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_MANAGER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity for the release bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          user_id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${user_id}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs npm >= 11.5.1; node 20 ships npm 10.
      # Pin to 11 (not latest): npm 12 requires node 22+.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11

      - run: npm ci

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          title: "chore: release"
          commit: "chore: version packages"
          version: npm run changeset:version
          publish: npm run changeset:publish
        env:
          # No NODE_AUTH_TOKEN: npm publishes via OIDC trusted publishing.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  # Release candidate from staging. Publishes a Changesets snapshot
  # (X.Y.Z-rc-<timestamp>) under the `rc` dist-tag so downstreams can test with
  # `npm i @lerna-labs/ekklesia-helpers@rc`. Nothing is committed; the `rc` tag
  # never moves `latest`. Skipped when there are no pending changesets (the
  # snapshot would otherwise equal the released version already on npm).
  rc:
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11

      - run: npm ci

      - name: Compute snapshot RC version
        id: rc
        run: |
          pending=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | head -1)
          if [ -n "$pending" ]; then
            npx changeset version --snapshot rc
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
            echo "has_rc=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_rc=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets; nothing to publish as a release candidate."
          fi

      - name: Build
        if: steps.rc.outputs.has_rc == 'true'
        run: npm run build

      - name: Publish rc snapshot to npm
        if: steps.rc.outputs.has_rc == 'true'
        # --no-git-checks: the working tree is intentionally dirty from the
        # snapshot bump, which is discarded next and never committed.
        run: npm publish --tag rc --no-git-checks

      - name: Discard snapshot bump
        run: git checkout -- .
